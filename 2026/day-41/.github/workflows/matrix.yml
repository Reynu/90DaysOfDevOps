name: Matrix Build

on:
  push:
    branches: [main]

jobs:
  matrix-job:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

        exclude:
          - os: windows-latest
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Print Python version
        run: python --version

      - name: Simulate failure (test fail-fast)
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        run: exit 1