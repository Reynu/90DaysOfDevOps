name: Self Hosted Runner Test

on:
  workflow_dispatch:

jobs:
  self-hosted-job:
    runs-on: [self-hosted, my-linux-runner]

    steps:
      - name: Print hostname
        run: hostname

      - name: Print working directory
        run: pwd

      - name: Create test file
        run: echo "Hello from self-hosted runner" > test-file.txt

      - name: Verify file
        run: ls -l