name: GitHub Hosted Runners

on:
  workflow_dispatch:

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print details
        run: |
          echo "OS: Ubuntu"
          hostname
          whoami

      - name: Check installed tools
        run: |
            docker --version
            python --version
            node --version
            git --version        

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Print details
        run: |
          echo OS: Windows
          hostname
          whoami

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print details
        run: |
          echo "OS: macOS"
          hostname
          whoami

       